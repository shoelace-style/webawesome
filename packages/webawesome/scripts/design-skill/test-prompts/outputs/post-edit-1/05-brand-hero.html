<!doctype html>
<html lang="en" class="wa-theme-default wa-palette-default wa-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brand hero</title>
    <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.8.0/styles/webawesome.css" />
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.8.0/webawesome.loader.js"></script>
    <style>
      html,
      body {
        min-height: 100%;
        padding: 0;
        margin: 0;
      }

      /* Full-bleed brand band. Text inherits the on-loud token so headline + lede stay
         readable against the saturated fill. */
      .hero {
        background-color: var(--wa-color-brand-fill-loud);
        color: var(--wa-color-brand-on-loud);
        padding-block: var(--wa-space-4xl);
        padding-inline: var(--wa-space-xl);
      }

      /* Constrained centered content column so headline + lede sit at a readable measure. */
      .hero-content {
        max-width: 44rem;
        margin-inline: auto;
        text-align: center;
      }

      .hero-headline {
        font-size: var(--wa-font-size-4xl);
        line-height: var(--wa-line-height-condensed);
        margin: 0;
      }

      .hero-lede {
        font-size: var(--wa-font-size-l);
        line-height: var(--wa-line-height-normal);
        margin: 0;
        /* Inherit the on-loud color from .hero so the lede has full contrast against
           the brand fill (rather than picking up a muted page-surface color). */
        color: inherit;
      }

      /* Primary CTA on a brand band: variant="brand" would blend into the fill, so flip
         the button's base part to a solid on-color surface with brand-colored text.
         Per the button reference, ::part(base) is the supported way through the
         shadow boundary for background/border/color. */
      .hero wa-button.cta-primary::part(base) {
        background-color: var(--wa-color-brand-on-loud);
        border-color: var(--wa-color-brand-on-loud);
        color: var(--wa-color-brand-fill-loud);
      }

      /* Secondary outlined CTA: recolor border + label to the on-loud token so both
         the outline and the label are clearly visible against the brand fill.
         (Default outlined+brand would resolve to brand-on-brand and disappear.) */
      .hero wa-button.cta-secondary::part(base) {
        background-color: transparent;
        border-color: var(--wa-color-brand-on-loud);
        color: var(--wa-color-brand-on-loud);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-content wa-stack wa-gap-l wa-align-items-center">
          <h1 class="hero-headline wa-text-balance">Design interfaces that feel intentional.</h1>
          <p class="hero-lede wa-text-pretty">
            A complete system of accessible components, layout utilities, and design tokens — so your team ships
            polished product without reinventing the basics.
          </p>
          <div class="wa-cluster wa-gap-s">
            <wa-button class="cta-primary" variant="brand" size="l">
              <wa-icon slot="start" name="rocket"></wa-icon>
              Get started
            </wa-button>
            <wa-button class="cta-secondary" variant="brand" appearance="outlined" size="l">
              <wa-icon slot="start" name="circle-play"></wa-icon>
              Watch demo
            </wa-button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
