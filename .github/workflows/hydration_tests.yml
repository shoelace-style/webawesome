# Crawls every component docs page in SSR mode and fails if any page emits a
# `lit-hydration-error` event. SSR is only produced by the dev server's request
# middleware, so the dev server (`npm start`) must be running while we crawl.

name: Hydration Tests

on:
  push:
    branches: [next]
  pull_request:
    branches: [next]
  workflow_dispatch:

jobs:
  hydration_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: ./packages/webawesome

      # `npm start` builds, then serves with SSR on port 4000 and stays alive in
      # watch mode. Background it; check-hydration.js waits for it to come up.
      - name: Start dev server
        run: npm start &
        working-directory: ./packages/webawesome

      - name: Check docs pages for hydration errors
        run: npm run test:hydration
        working-directory: ./packages/webawesome
